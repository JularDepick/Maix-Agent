syntax = "proto3";
package maix.core.v1;

message ListArchitecturesRequest {}
message ListArchitecturesResponse {
  repeated ArchitectureInfo architectures = 1;
}

message ArchitectureInfo {
  string id = 1;
  string name = 2;
  optional string description = 3;
  string topology = 4;
  uint32 node_count = 5;
  uint32 flow_count = 6;
}

message RunArchitectureRequest {
  string name = 1;
  string input = 2;
}

message RunArchitectureOutput {
  string node_id = 1;
  string role = 2;
  oneof output {
    string text_delta = 3;
    string tool_call = 4;
    string complete = 5;
    string error = 6;
  }
}
