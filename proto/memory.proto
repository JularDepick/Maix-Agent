syntax = "proto3";
package maix.core.v1;

message SearchMemoryRequest {
  string query = 1;
  uint32 limit = 2;
  optional string session_id = 3;
}

message SearchMemoryResponse {
  repeated MemoryEntry entries = 1;
}

message SaveMemoryRequest {
  string content = 1;
  MemoryKind kind = 2;
  optional float importance = 3;
  optional string session_id = 4;
}

enum MemoryKind {
  MEMORY_KIND_UNSPECIFIED = 0;
  MEMORY_KIND_EPISODIC = 1;
  MEMORY_KIND_SEMANTIC = 2;
  MEMORY_KIND_WORKING = 3;
}

message SaveMemoryResponse { string memory_id = 1; }

message ForgetMemoryRequest { string memory_id = 1; }
message ForgetMemoryResponse { bool deleted = 1; }

message MemoryEntry {
  string id = 1;
  string content = 2;
  MemoryKind kind = 3;
  float importance = 4;
  string created_at = 5;
}
