syntax = "proto3";
package maix.core.v1;

message InstallSkillRequest { string source_path = 1; }
message InstallSkillResponse {
  string name = 1;
  string version = 2;
}

message ListSkillsRequest {}
message ListSkillsResponse {
  repeated SkillInfo skills = 1;
}

message SkillInfo {
  string name = 1;
  string version = 2;
  string runtime = 3;
  bool enabled = 4;
  string installed_at = 5;
}

message RemoveSkillRequest { string name = 1; }
message RemoveSkillResponse { bool removed = 1; }

message EnableSkillRequest { string name = 1; }
message EnableSkillResponse { bool enabled = 1; }

message DisableSkillRequest { string name = 1; }
message DisableSkillResponse { bool disabled = 1; }
