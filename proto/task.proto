syntax = "proto3";
package maix.core.v1;

message SubmitTaskRequest {
  string description = 1;
  string input = 2;
  uint32 priority = 3;
  repeated string depends_on = 4;
  optional string position = 5;
}

message SubmitTaskResponse { string task_id = 1; }

message ListTasksRequest { optional string status_filter = 1; }
message ListTasksResponse {
  repeated TaskInfo tasks = 1;
}

message TaskInfo {
  string id = 1;
  string description = 2;
  uint32 priority = 3;
  string status = 4;
  optional string assigned = 5;
  uint32 retries = 6;
  uint32 max_retries = 7;
}

message CancelTaskRequest { string task_id = 1; }
message CancelTaskResponse { bool cancelled = 1; }

message ReprioritizeTaskRequest {
  string task_id = 1;
  uint32 priority = 2;
}
message ReprioritizeTaskResponse { bool updated = 1; }

message SuspendTaskRequest { string task_id = 1; }
message SuspendTaskResponse { bool suspended = 1; }

message ResumeTaskRequest {
  string task_id = 1;
  optional string position = 2;
}
message ResumeTaskResponse { bool resumed = 1; }
