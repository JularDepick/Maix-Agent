syntax = "proto3";
package maix.core.v1;

import "common.proto";
import "google/protobuf/struct.proto";

message ListToolsRequest {}
message ListToolsResponse {
  repeated ToolInfo tools = 1;
}

message ToolInfo {
  string name = 1;
  string description = 2;
  google.protobuf.Struct parameters = 3;
  RiskLevel risk_level = 4;
}

enum RiskLevel {
  RISK_LEVEL_UNSPECIFIED = 0;
  RISK_LEVEL_READ_ONLY = 1;
  RISK_LEVEL_WRITE = 2;
  RISK_LEVEL_NETWORK = 3;
  RISK_LEVEL_SHELL = 4;
}

message CallToolRequest {
  string session_id = 1;
  string tool_name = 2;
  google.protobuf.Struct arguments = 3;
  string working_dir = 4;
}

message CallToolResponse {
  string result = 1;
  optional string error = 2;
  uint64 duration_ms = 3;
}

// Session CRUD
message CreateSessionRequest { optional string name = 1; }
message CreateSessionResponse { string session_id = 1; }

message ListSessionsRequest {}
message ListSessionsResponse {
  repeated SessionInfo sessions = 1;
}

message SessionInfo {
  string id = 1;
  string name = 2;
  string created_at = 3;
  string updated_at = 4;
  uint32 message_count = 5;
}

message DeleteSessionRequest { string session_id = 1; }
message DeleteSessionResponse { bool deleted = 1; }

message GetSessionMessagesRequest {
  string session_id = 1;
  uint32 limit = 2;
}
message GetSessionMessagesResponse {
  repeated SessionMessage messages = 1;
}
message SessionMessage {
  string role = 1;
  string content = 2;
  uint64 token_count = 3;
  string created_at = 4;
}

message ForkSessionRequest {
  string session_id = 1;
  string from_message_id = 2;
  optional string new_session_name = 3;
}
message ForkSessionResponse {
  string new_session_id = 1;
  uint32 copied_messages = 2;
}

// Agent identities
message ListAgentsRequest {}
message ListAgentsResponse {
  repeated AgentInfo agents = 1;
  optional string active = 2;
}

message AgentInfo {
  string name = 1;
  string description = 2;
  string tone = 3;
  repeated string traits = 4;
  repeated string domains = 5;
}

message ActivateAgentRequest { string name = 1; }
message ActivateAgentResponse {
  bool activated = 1;
  string system_prompt = 2;
}
