# Maix-Agent default configuration.
# System config: <exe_dir>/system.toml (server listen addr/port)
# User config:   ~/.maix/settings.json (providers, agent, memory, tools)
# Env overrides: MAIX_PROVIDERS_DEEPSEEK_API_KEY etc.

[agent]
max_tool_rounds = 16
context_threshold = 0.9
mode = "agent"

[memory]
dir = ""

[tools]
shell_enabled = false

[server]
listen_addr = "127.0.0.1"
listen_port = 26506
