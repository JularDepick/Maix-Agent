# Maix-Agent system configuration.
# Place this file alongside the maix.exe binary.
# This file controls server-level settings (listen address, port, transport).
# User-level settings (API keys, providers) go in ~/.maix/settings.json.

[server]
listen_addr = "127.0.0.1"
listen_port = 26506
# transport = "auto"  # auto | tcp | unix_socket | named_pipe
# socket_path = ""
